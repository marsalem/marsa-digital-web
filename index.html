<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marsa Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #EAF1F8; color: #10243D; }
    .hero { background: linear-gradient(145deg, #1B3A5C, #326499); color: white; padding: 80px 24px; text-align: center; }
    .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .hero p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 32px; }
    .apps { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; padding: 60px 24px; max-width: 800px; margin: 0 auto; }
    .app-card { background: white; border-radius: 20px; padding: 32px; flex: 1; min-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    .app-icon { width: 80px; height: 80px; border-radius: 18px; background: linear-gradient(145deg, #1B3A5C, #326499); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .app-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: #10243D; }
    .app-card p { font-size: 0.95rem; color: #5A6A7A; line-height: 1.6; margin-bottom: 20px; }
    .btn { display: inline-block; background: #326499; color: white; padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
    footer { text-align: center; padding: 32px; color: #8FA8BD; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Marsa Digital</h1>
    <p>Apps for meaningful connections</p>
  </div>
  <div class="apps">
    <div class="app-card">
      <div class="app-icon">🌙</div>
      <h2>Quran Atlas</h2>
      <p>Your personal topical Quran — organize verses, study with Tafsir, and share with others.</p>
      <a class="btn" href="/quran-atlas">Learn More</a>
    </div>
  </div>
  <footer>© 2026 Marsa Digital · <a href="/quran-atlas/privacy" style="color:#326499">Privacy</a></footer>
</body>
</html>
